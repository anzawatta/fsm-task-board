<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSM Task Board</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Sans+JP:wght@400;500;600&display=swap');

:root {
  --bg-primary: #f7f7f8;
  --bg-secondary: #ffffff;
  --bg-tertiary: #f0f0f3;
  --bg-panel: #ffffff;
  --bg-hover: #e8e8ec;
  --border-dim: #e0e0e8;
  --border-mid: #c8c8d4;
  --border-bright: #9898a8;
  --text-primary: #18181b;
  --text-secondary: #3f3f46;
  --text-dim: #888898;
  --accent-idle: #8080a0;
  --accent-wip: #c87000;
  --accent-done: #15803d;
  --accent-validation: #7c3aed;
  --accent-verification: #1d6ac4;
  --accent-danger: #dc2626;
  --accent-edge: #9090a8;
  --shadow-glow: 0 0 20px rgba(100, 100, 130, 0.12);
  --font-mono: 'JetBrains Mono', monospace;
  --font-sans: 'IBM Plex Sans', 'IBM Plex Sans JP', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
}

/* === LAYOUT === */
.app {
  display: grid;
  grid-template-columns: 1fr 340px;
  grid-template-rows: 48px 1fr;
  height: 100vh;
}

/* === TOOLBAR === */
.toolbar {
  grid-column: 1 / -1;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-dim);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
  z-index: 100;
}

.toolbar-title {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--text-secondary);
  text-transform: uppercase;
  margin-right: 16px;
  user-select: none;
}

.toolbar-title span { color: var(--accent-wip); }

.toolbar-sep {
  width: 1px;
  height: 24px;
  background: var(--border-dim);
  margin: 0 4px;
}

.btn {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.03em;
  padding: 6px 12px;
  border: 1px solid var(--border-mid);
  border-radius: 4px;
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.btn:hover {
  background: var(--bg-hover);
  border-color: var(--border-bright);
  color: var(--text-primary);
}

.btn-accent {
  border-color: var(--accent-wip);
  color: var(--accent-wip);
}

.btn-accent:hover {
  background: rgba(200, 112, 0, 0.08);
}

.btn-danger {
  border-color: var(--accent-danger);
  color: var(--accent-danger);
}

.btn-danger:hover {
  background: rgba(220, 38, 38, 0.08);
}

.toolbar-right {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
}

/* === CANVAS === */
.canvas-area {
  position: relative;
  overflow: hidden;
  background: var(--bg-primary);
  cursor: grab;
}

.canvas-area:active { cursor: grabbing; }

.canvas-area svg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

/* Grid background */
.canvas-area::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    radial-gradient(circle, var(--border-mid) 1px, transparent 1px);
  background-size: 24px 24px;
  opacity: 0.6;
  pointer-events: none;
  z-index: 0;
}

/* === NODES === */
.fsm-node {
  cursor: pointer;
  user-select: none;
}

.fsm-node:hover .node-body { filter: brightness(0.96); }

.node-body {
  rx: 6;
  ry: 6;
  transition: filter 0.15s;
}

.node-label {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  fill: var(--text-primary);
  pointer-events: none;
  text-anchor: middle;
  dominant-baseline: central;
}

.node-status-indicator {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  pointer-events: none;
  text-anchor: middle;
}

.node-dod-count {
  font-family: var(--font-mono);
  font-size: 9px;
  fill: var(--text-dim);
  pointer-events: none;
  text-anchor: middle;
}

.node-selected .node-body {
  stroke-width: 2;
  filter: drop-shadow(0 0 6px rgba(200, 112, 0, 0.25));
}

/* === EDGES === */
.fsm-edge {
  cursor: pointer;
}

.edge-line {
  fill: none;
  stroke: var(--accent-edge);
  stroke-width: 1.5;
  marker-end: url(#arrowhead);
  transition: stroke 0.15s;
}

.fsm-edge:hover .edge-line {
  stroke: var(--text-secondary);
  stroke-width: 2;
}

.edge-label-bg {
  fill: var(--bg-primary);
  rx: 3;
  ry: 3;
}

.edge-label {
  font-family: var(--font-mono);
  font-size: 10px;
  fill: var(--text-dim);
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
}

/* === SIDE PANEL === */
.side-panel {
  background: var(--bg-secondary);
  border-left: 1px solid var(--border-dim);
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.panel-section {
  background: var(--bg-tertiary);
  border: 1px solid var(--border-dim);
  border-radius: 6px;
  padding: 12px;
}

.panel-section-title {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 10px;
}

.panel-empty {
  font-size: 12px;
  color: var(--text-dim);
  text-align: center;
  padding: 32px 16px;
  line-height: 1.6;
}

/* === FORM ELEMENTS === */
.field-group {
  margin-bottom: 10px;
}

.field-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  color: var(--text-dim);
  margin-bottom: 4px;
  display: block;
}

.field-input {
  width: 100%;
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 6px 8px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-dim);
  border-radius: 4px;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.15s;
}

.field-input:focus {
  border-color: var(--border-bright);
}

/* === STATUS TOGGLE === */
.status-toggle {
  display: flex;
  gap: 4px;
}

.status-option {
  flex: 1;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  padding: 5px 4px;
  border: 1px solid var(--border-dim);
  border-radius: 3px;
  background: var(--bg-secondary);
  color: var(--text-dim);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}

.status-option:hover { border-color: var(--border-mid); }

.status-option.active-idle {
  border-color: var(--accent-idle);
  color: var(--accent-idle);
  background: rgba(128, 128, 160, 0.08);
}

.status-option.active-wip {
  border-color: var(--accent-wip);
  color: var(--accent-wip);
  background: rgba(200, 112, 0, 0.08);
}

.status-option.active-done {
  border-color: var(--accent-done);
  color: var(--accent-done);
  background: rgba(21, 128, 61, 0.08);
}

/* === DoD LIST === */
.dod-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.dod-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 8px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-dim);
  border-radius: 4px;
  font-size: 12px;
  transition: border-color 0.15s;
}

.dod-item.type-verification {
  border-left: 3px solid var(--accent-verification);
}

.dod-item.type-validation {
  border-left: 3px solid var(--accent-validation);
}

.dod-check {
  margin-top: 2px;
  cursor: pointer;
  accent-color: var(--accent-done);
  flex-shrink: 0;
}

.dod-text {
  flex: 1;
  font-family: var(--font-sans);
  color: var(--text-secondary);
  line-height: 1.4;
  word-break: break-word;
}

.dod-item.checked .dod-text {
  text-decoration: line-through;
  color: var(--text-dim);
}

.dod-type-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 2px;
  flex-shrink: 0;
  letter-spacing: 0.03em;
}

.dod-type-badge.verification {
  color: var(--accent-verification);
  background: rgba(29, 106, 196, 0.1);
}

.dod-type-badge.validation {
  color: var(--accent-validation);
  background: rgba(124, 58, 237, 0.1);
}

.dod-actions {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
}

.dod-action-btn {
  font-size: 11px;
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  border-radius: 2px;
}

.dod-action-btn:hover {
  background: var(--bg-hover);
  color: var(--text-secondary);
}

.dod-add-row {
  display: flex;
  gap: 4px;
  margin-top: 4px;
}

.dod-add-input {
  flex: 1;
  font-family: var(--font-sans);
  font-size: 11px;
  padding: 5px 8px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-dim);
  border-radius: 3px;
  color: var(--text-primary);
  outline: none;
}

.dod-add-input:focus { border-color: var(--border-mid); }

.dod-type-select {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 4px 6px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-dim);
  border-radius: 3px;
  color: var(--text-secondary);
  outline: none;
  cursor: pointer;
}

/* === EDGE PANEL === */
.edge-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.edge-list-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 8px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-dim);
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: border-color 0.15s;
}

.edge-list-item:hover { border-color: var(--border-mid); }

.edge-arrow { color: var(--text-dim); }

/* === VALIDATION GATE INDICATOR === */
.validation-gate {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  background: rgba(124, 58, 237, 0.05);
  border: 1px solid rgba(124, 58, 237, 0.2);
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--accent-validation);
  margin-top: 8px;
}

.validation-gate-icon { font-size: 14px; }

/* === EDGE CREATION MODE === */
.edge-mode-banner {
  position: fixed;
  top: 56px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-panel);
  border: 1px solid var(--accent-wip);
  border-radius: 6px;
  padding: 8px 16px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent-wip);
  z-index: 200;
  box-shadow: var(--shadow-glow);
  display: none;
}

.edge-mode-banner.active { display: block; }

/* === JSON MODAL === */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border-mid);
  border-radius: 8px;
  width: 600px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-dim);
}

.modal-title {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.modal-body {
  padding: 16px;
  overflow-y: auto;
  flex: 1;
}

.modal-textarea {
  width: 100%;
  min-height: 300px;
  font-family: var(--font-mono);
  font-size: 11px;
  line-height: 1.5;
  padding: 12px;
  background: var(--bg-primary);
  border: 1px solid var(--border-dim);
  border-radius: 4px;
  color: var(--text-primary);
  resize: vertical;
  outline: none;
}

.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid var(--border-dim);
}

/* === CONTEXT MENU === */
.context-menu {
  position: fixed;
  background: var(--bg-panel);
  border: 1px solid var(--border-mid);
  border-radius: 6px;
  padding: 4px;
  z-index: 500;
  display: none;
  min-width: 160px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}

.context-menu.active { display: block; }

.context-menu-item {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 6px 12px;
  color: var(--text-secondary);
  cursor: pointer;
  border-radius: 3px;
  transition: background 0.1s;
}

.context-menu-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.context-menu-item.danger { color: var(--accent-danger); }
.context-menu-item.danger:hover { background: rgba(220, 38, 38, 0.08); }

/* === DIRTY BADGE === */
.dirty-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--accent-wip);
  display: none;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border: 1px solid var(--accent-wip);
  border-radius: 3px;
  background: rgba(200, 112, 0, 0.06);
  animation: dirty-pulse 2s ease-in-out infinite;
}

.dirty-badge.visible { display: flex; }

@keyframes dirty-pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.55; }
}

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }

/* === LEGEND === */
.legend {
  position: absolute;
  bottom: 12px;
  left: 12px;
  display: flex;
  gap: 12px;
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-dim);
  z-index: 10;
  pointer-events: none;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
}

.legend-swatch {
  width: 8px;
  height: 8px;
  border-radius: 2px;
}
</style>
</head>
<body>

<div class="app">
  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="toolbar-title">FSM<span>:</span>Task Board</div>
    <button class="btn" onclick="addNode()" title="Add Node">+ Node</button>
    <button class="btn" id="edgeModeBtn" onclick="toggleEdgeMode()" title="Add Edge">+ Edge</button>
    <div class="toolbar-sep"></div>
    <button class="btn" onclick="fitView()">Fit View</button>
    <div class="toolbar-right">
      <div class="dirty-badge" id="dirtyBadge">● 未保存</div>
      <button class="btn" onclick="showImportModal()">Import JSON</button>
      <button class="btn btn-accent" onclick="showExportModal()">Export JSON</button>
    </div>
  </div>

  <!-- CANVAS -->
  <div class="canvas-area" id="canvas">
    <svg id="svgCanvas" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrowhead" viewBox="0 0 10 7" refX="10" refY="3.5"
          markerWidth="8" markerHeight="6" orient="auto-start-reverse">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--accent-edge)" />
        </marker>
      </defs>
      <g id="edgesGroup"></g>
      <g id="nodesGroup"></g>
    </svg>
    <div class="legend">
      <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-idle)"></div> 未着手</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-wip)"></div> 実装中</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-done)"></div> 完了</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-verification)"></div> Verification</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-validation)"></div> Validation</div>
    </div>
    <div class="edge-mode-banner" id="edgeModeBanner">
      Edge Mode: click source → click target &nbsp;|&nbsp; ESC to cancel
    </div>
  </div>

  <!-- SIDE PANEL -->
  <div class="side-panel" id="sidePanel">
    <div class="panel-empty" id="panelEmpty">
      クリックでノード選択<br>
      <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim)">
        右クリックでコンテキストメニュー
      </span>
    </div>
    <div id="panelContent" style="display:none"></div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div class="context-menu" id="contextMenu"></div>

<!-- JSON MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Export JSON</span>
      <button class="btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <textarea class="modal-textarea" id="modalTextarea" spellcheck="false"></textarea>
    </div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script>
// ============================================================
// FSM TASK BOARD — Canvas JSON Hybrid Data Model
//
// JSON Schema準拠:
//   nodes[]      — Canvas必須 (旧: states[])
//   edges[].id   — Canvas必須
//   edges[].fromNode / toNode — Canvas必須 (旧: from / to)
//   node.width / height      — Canvas必須
//   node.status / dod        — 独自拡張フィールド
// ============================================================

// デフォルトノードサイズ (Canvas必須フィールドの初期値)
const DEFAULT_NODE_W = 160;
const DEFAULT_NODE_H = 56;

const FSM = {
  nodes: {},   // Canvas準拠: 旧 states
  edges: {},
  _idCounter: 0,
  _edgeIdCounter: 0,

  genId()     { return 's' + (++this._idCounter); },
  genEdgeId() { return 'e' + (++this._edgeIdCounter); },

  // Canvas必須: x, y, width, height + 独自拡張: status, dod
  addNode(name, x, y, width, height) {
    const id = this.genId();
    this.nodes[id] = {
      id,
      name,
      x,
      y,
      width:  width  || DEFAULT_NODE_W,
      height: height || DEFAULT_NODE_H,
      // 独自拡張フィールド
      status: 'idle',
      dod: []
    };
    return id;
  },

  // Canvas準拠: fromNode / toNode (旧: from / to)
  addEdge(fromNode, toNode, label) {
    const id = this.genEdgeId();
    this.edges[id] = { id, fromNode, toNode, label: label || '' };
    return id;
  },

  removeNode(id) {
    delete this.nodes[id];
    Object.keys(this.edges).forEach(eid => {
      const e = this.edges[eid];
      if (e.fromNode === id || e.toNode === id) delete this.edges[eid];
    });
  },

  removeEdge(id) { delete this.edges[id]; },

  addDoDItem(nodeId, text, type) {
    const node = this.nodes[nodeId];
    if (!node) return;
    const item = {
      id: 'd' + Date.now() + Math.random().toString(36).slice(2, 5),
      text, type: type || 'verification', checked: false
    };
    node.dod.push(item);
    return item;
  },

  removeDoDItem(nodeId, dodId) {
    const node = this.nodes[nodeId];
    if (!node) return;
    node.dod = node.dod.filter(d => d.id !== dodId);
  },

  hasUncheckedValidation(nodeId) {
    const node = this.nodes[nodeId];
    if (!node) return false;
    return node.dod.some(d => d.type === 'validation' && !d.checked);
  },

  allDoDChecked(nodeId) {
    const node = this.nodes[nodeId];
    if (!node || node.dod.length === 0) return false;
    return node.dod.every(d => d.checked);
  },

  // -------------------------------------------------------
  // Canvas JSON Schema Export
  // -------------------------------------------------------
  toJSON() {
    return JSON.stringify({
      nodes: Object.values(this.nodes).map(n => ({
        // Canvas必須フィールド
        id:     n.id,
        name:   n.name,
        x:      Math.round(n.x),
        y:      Math.round(n.y),
        width:  n.width,
        height: n.height,
        // 独自拡張フィールド
        status: n.status,
        dod: n.dod.map(d => ({
          text:    d.text,
          type:    d.type,
          checked: d.checked
        }))
      })),
      edges: Object.values(this.edges).map(e => ({
        // Canvas必須フィールド
        id:       e.id,
        fromNode: e.fromNode,
        toNode:   e.toNode,
        label:    e.label
      }))
    }, null, 2);
  },

  // -------------------------------------------------------
  // Canvas JSON Schema Import
  // (後方互換: states[] / from / to も受容)
  // -------------------------------------------------------
  fromJSON(json) {
    const data = typeof json === 'string' ? JSON.parse(json) : json;
    this.nodes = {};
    this.edges = {};
    this._idCounter = 0;
    this._edgeIdCounter = 0;

    // nodes[] 優先、なければ旧 states[] にフォールバック
    const rawNodes = data.nodes || data.states || [];
    rawNodes.forEach(n => {
      const id = n.id || this.genId();
      const numId = parseInt(id.replace('s', ''));
      if (!isNaN(numId) && numId > this._idCounter) this._idCounter = numId;
      this.nodes[id] = {
        id,
        name:   n.name,
        x:      n.x,
        y:      n.y,
        width:  n.width  || DEFAULT_NODE_W,
        height: n.height || DEFAULT_NODE_H,
        status: n.status || 'idle',
        dod: (n.dod || []).map(d => ({
          id:      'd' + Date.now() + Math.random().toString(36).slice(2, 5),
          text:    d.text,
          type:    d.type || 'verification',
          checked: d.checked || false
        }))
      };
    });

    (data.edges || []).forEach(e => {
      const id = e.id || this.genEdgeId();
      const numId = parseInt(id.replace('e', ''));
      if (!isNaN(numId) && numId > this._edgeIdCounter) this._edgeIdCounter = numId;
      this.edges[id] = {
        id,
        // fromNode 優先、なければ旧 from にフォールバック
        fromNode: e.fromNode || e.from,
        toNode:   e.toNode   || e.to,
        label:    e.label || ''
      };
    });
  }
};


// ============================================================
// UI STATE
// ============================================================

let selectedNodeId = null;
let selectedEdgeId = null;
let edgeMode = false;
let edgeModeSource = null;
let dragging = null;
let panState = null;
let viewOffset = { x: 0, y: 0 };
let viewScale = 1;
let isDirty = false;

function markDirty() {
  isDirty = true;
  document.getElementById('dirtyBadge').classList.add('visible');
}

function clearDirty() {
  isDirty = false;
  document.getElementById('dirtyBadge').classList.remove('visible');
}

// タブ/ウィンドウ閉じ時の警告
window.addEventListener('beforeunload', e => {
  if (!isDirty) return;
  e.preventDefault();
  e.returnValue = '';
});


// ============================================================
// RENDERING
// ============================================================

function render() {
  renderEdges();
  renderNodes();
  renderSidePanel();
}

function statusColor(status) {
  return status === 'wip'  ? 'var(--accent-wip)'  :
         status === 'done' ? 'var(--accent-done)'  :
                             'var(--accent-idle)';
}

function statusLabel(status) {
  return status === 'wip'  ? '実装中' :
         status === 'done' ? '完了'   : '未着手';
}

function renderNodes() {
  const g = document.getElementById('nodesGroup');
  g.innerHTML = '';

  Object.values(FSM.nodes).forEach(node => {
    const nw = node.width;
    const nh = node.height;

    const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    group.classList.add('fsm-node');
    if (node.id === selectedNodeId) group.classList.add('node-selected');
    group.setAttribute('transform', `translate(${node.x}, ${node.y})`);

    // Body (Canvas必須: width / height を使用)
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.classList.add('node-body');
    rect.setAttribute('x', -nw / 2);
    rect.setAttribute('y', -nh / 2);
    rect.setAttribute('width',  nw);
    rect.setAttribute('height', nh);
    rect.setAttribute('fill',   'var(--bg-secondary)');
    rect.setAttribute('stroke', statusColor(node.status));
    rect.setAttribute('stroke-width', node.id === selectedNodeId ? '2' : '1.5');

    if (FSM.hasUncheckedValidation(node.id)) {
      rect.setAttribute('stroke-dasharray', '6 3');
    }
    group.appendChild(rect);

    // Label
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.classList.add('node-label');
    label.setAttribute('y', -6);
    label.textContent = node.name.length > 14
      ? node.name.slice(0, 13) + '…'
      : node.name;
    group.appendChild(label);

    // Status + DoD count
    const statusText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    statusText.classList.add('node-status-indicator');
    statusText.setAttribute('y', 12);
    statusText.setAttribute('fill', statusColor(node.status));
    const dodDone  = node.dod.filter(d => d.checked).length;
    const dodTotal = node.dod.length;
    const dodStr   = dodTotal > 0 ? ` [${dodDone}/${dodTotal}]` : '';
    statusText.textContent = statusLabel(node.status) + dodStr;
    group.appendChild(statusText);

    // Events
    group.addEventListener('mousedown', e => onNodeMouseDown(e, node.id));
    group.addEventListener('click',     e => onNodeClick(e, node.id));
    group.addEventListener('contextmenu', e => onNodeContext(e, node.id));

    g.appendChild(group);
  });
}

function renderEdges() {
  const g = document.getElementById('edgesGroup');
  g.innerHTML = '';

  const edges = Object.values(FSM.edges);

  // -------------------------------------------------------
  // 1. 並行グループを事前集計
  //    parallelGroups["A→B"] = [edgeId, ...]  同方向のみ
  //    selfLoopGroups["A"]   = [edgeId, ...]  自己ループ
  // -------------------------------------------------------
  const parallelGroups = {};
  const selfLoopGroups = {};

  edges.forEach(e => {
    if (e.fromNode === e.toNode) {
      if (!selfLoopGroups[e.fromNode]) selfLoopGroups[e.fromNode] = [];
      selfLoopGroups[e.fromNode].push(e.id);
    } else {
      const key = `${e.fromNode}→${e.toNode}`;
      if (!parallelGroups[key]) parallelGroups[key] = [];
      parallelGroups[key].push(e.id);
    }
  });

  // 2. 各エッジのレイアウト情報を構築
  const edgeLayout = {}; // edgeId → { index, groupSize, hasBidi } | { loopIndex, loopGroupSize }

  Object.entries(parallelGroups).forEach(([key, ids]) => {
    const [fn, tn] = key.split('→');
    const hasBidi  = !!parallelGroups[`${tn}→${fn}`];
    ids.forEach((id, i) => {
      edgeLayout[id] = { index: i, groupSize: ids.length, hasBidi };
    });
  });

  Object.entries(selfLoopGroups).forEach(([, ids]) => {
    ids.forEach((id, i) => {
      edgeLayout[id] = { loopIndex: i, loopGroupSize: ids.length };
    });
  });

  // -------------------------------------------------------
  // オフセット定数
  // STEP      : 並行エッジ間の垂直距離 (px)
  // BIDI_BASE : 対向エッジが存在する場合のグループ全体のシフト量
  // -------------------------------------------------------
  const STEP      = 30;
  const BIDI_BASE = 15;

  // -------------------------------------------------------
  // 3. 描画
  // -------------------------------------------------------
  edges.forEach(edge => {
    const from = FSM.nodes[edge.fromNode];
    const to   = FSM.nodes[edge.toNode];
    if (!from || !to) return;

    const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    group.classList.add('fsm-edge');

    const layout = edgeLayout[edge.id];

    if (edge.fromNode === edge.toNode) {
      // --- 自己ループ ---
      // 複数ある場合はループの高さをずらして重ならないようにする
      const { loopIndex, loopGroupSize } = layout;
      const spread = loopGroupSize > 1 ? loopIndex / (loopGroupSize - 1) : 0.5;
      const loopW  = 44 + spread * 20;   // 幅: 44〜64
      const loopH  = 48 + loopIndex * 20; // 高さ: ループごとに20px増

      const cx = from.x;
      const cy = from.y - from.height / 2;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.classList.add('edge-line');
      path.setAttribute('d',
        `M ${cx - loopW/2} ${cy}` +
        ` C ${cx - loopW} ${cy - loopH},` +
        `   ${cx + loopW} ${cy - loopH},` +
        `   ${cx + loopW/2} ${cy}`
      );
      group.appendChild(path);
      if (edge.label) addEdgeLabel(group, cx, cy - loopH + 8, edge.label);

    } else {
      // --- 通常エッジ ---
      const { index, groupSize, hasBidi } = layout;

      const angle = Math.atan2(to.y - from.y, to.x - from.x);
      const x1 = from.x + Math.cos(angle) * (from.width  / 2 + 2);
      const y1 = from.y + Math.sin(angle) * (from.height / 2 + 2);
      const x2 = to.x   - Math.cos(angle) * (to.width    / 2 + 8);
      const y2 = to.y   - Math.sin(angle) * (to.height   / 2 + 8);

      // 垂直オフセット量を決定
      //   parallelOffset: グループ内で対称展開
      //   bidiOffset    : 対向エッジがある場合にグループ全体をシフト
      const parallelOffset = (index - (groupSize - 1) / 2) * STEP;
      const bidiOffset     = hasBidi ? BIDI_BASE : 0;
      const totalOffset    = parallelOffset + bidiOffset;

      if (totalOffset === 0) {
        // 最適化: オフセット0 は直線で描画
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.classList.add('edge-line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y1);
        line.setAttribute('x2', x2); line.setAttribute('y2', y2);
        group.appendChild(line);
        if (edge.label) addEdgeLabel(group, (x1+x2)/2, (y1+y2)/2, edge.label);

      } else {
        // 二次ベジェ: 中点を垂直方向にtotalOffsetずらした制御点を使う
        const dx  = x2 - x1, dy = y2 - y1;
        const len = Math.sqrt(dx*dx + dy*dy) || 1;
        // 垂直単位ベクトル (左手系)
        const nx = -dy / len;
        const ny =  dx / len;
        const mx = (x1+x2)/2 + nx * totalOffset;
        const my = (y1+y2)/2 + ny * totalOffset;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.classList.add('edge-line');
        path.setAttribute('d', `M ${x1} ${y1} Q ${mx} ${my} ${x2} ${y2}`);
        group.appendChild(path);
        if (edge.label) addEdgeLabel(group, mx, my, edge.label);
      }
    }

    group.addEventListener('click', e => {
      e.stopPropagation();
      selectEdge(edge.id);
    });
    group.addEventListener('contextmenu', e => onEdgeContext(e, edge.id));
    g.appendChild(group);
  });
}

function addEdgeLabel(group, x, y, text) {
  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bg.classList.add('edge-label-bg');
  const textLen = text.length * 6 + 12;
  bg.setAttribute('x', x - textLen / 2);
  bg.setAttribute('y', y - 8);
  bg.setAttribute('width',  textLen);
  bg.setAttribute('height', 16);
  group.appendChild(bg);

  const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  label.classList.add('edge-label');
  label.setAttribute('x', x);
  label.setAttribute('y', y);
  label.textContent = text;
  group.appendChild(label);
}


// ============================================================
// SIDE PANEL
// ============================================================

function renderSidePanel() {
  const empty   = document.getElementById('panelEmpty');
  const content = document.getElementById('panelContent');

  if (selectedNodeId && FSM.nodes[selectedNodeId]) {
    empty.style.display   = 'none';
    content.style.display = 'block';
    renderNodePanel(FSM.nodes[selectedNodeId]);
  } else if (selectedEdgeId && FSM.edges[selectedEdgeId]) {
    empty.style.display   = 'none';
    content.style.display = 'block';
    renderEdgePanel(FSM.edges[selectedEdgeId]);
  } else {
    empty.style.display   = 'block';
    content.style.display = 'none';
  }
}

function renderNodePanel(node) {
  const content  = document.getElementById('panelContent');
  const dodDone  = node.dod.filter(d => d.checked).length;
  const dodTotal = node.dod.length;
  const hasValidationGate = FSM.hasUncheckedValidation(node.id);

  content.innerHTML = `
    <div class="panel-section">
      <div class="panel-section-title">Node</div>
      <div class="field-group">
        <label class="field-label">Name</label>
        <input class="field-input" value="${escHtml(node.name)}"
          onchange="updateNodeName('${node.id}', this.value)" />
      </div>
      <div class="field-group">
        <label class="field-label">Size (width × height)</label>
        <div style="display:flex;gap:6px">
          <input class="field-input" type="number" value="${node.width}" style="width:50%"
            onchange="updateNodeSize('${node.id}', this.value, null)" />
          <input class="field-input" type="number" value="${node.height}" style="width:50%"
            onchange="updateNodeSize('${node.id}', null, this.value)" />
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Status</label>
        <div class="status-toggle">
          <div class="status-option ${node.status === 'idle' ? 'active-idle' : ''}"
            onclick="setStatus('${node.id}', 'idle')">未着手</div>
          <div class="status-option ${node.status === 'wip'  ? 'active-wip'  : ''}"
            onclick="setStatus('${node.id}', 'wip')">実装中</div>
          <div class="status-option ${node.status === 'done' ? 'active-done' : ''}"
            onclick="setStatus('${node.id}', 'done')">完了</div>
        </div>
      </div>
      ${hasValidationGate ? `
      <div class="validation-gate">
        <span class="validation-gate-icon">⚠</span>
        Validation Gate: ユーザー確認待ち項目あり
      </div>` : ''}
    </div>

    <div class="panel-section">
      <div class="panel-section-title">DoD — Definition of Done ${dodTotal > 0 ? `(${dodDone}/${dodTotal})` : ''}</div>
      <div class="dod-list" id="dodList">
        ${node.dod.map(d => `
          <div class="dod-item type-${d.type} ${d.checked ? 'checked' : ''}" data-id="${d.id}">
            <input type="checkbox" class="dod-check" ${d.checked ? 'checked' : ''}
              onchange="toggleDoD('${node.id}', '${d.id}')" />
            <span class="dod-text">${escHtml(d.text)}</span>
            <span class="dod-type-badge ${d.type}">${d.type === 'validation' ? 'Val' : 'Ver'}</span>
            <div class="dod-actions">
              <button class="dod-action-btn"
                onclick="removeDoDItem('${node.id}', '${d.id}')" title="Delete">✕</button>
            </div>
          </div>
        `).join('')}
      </div>
      <div class="dod-add-row">
        <input class="dod-add-input" id="dodAddInput" placeholder="Add DoD item..."
          onkeydown="if(event.key==='Enter')addDoDFromInput('${node.id}')" />
        <select class="dod-type-select" id="dodTypeSelect">
          <option value="verification">Ver</option>
          <option value="validation">Val</option>
        </select>
        <button class="btn" style="padding:4px 8px;font-size:10px"
          onclick="addDoDFromInput('${node.id}')">+</button>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Edges</div>
      <div class="edge-list">
        ${Object.values(FSM.edges)
            .filter(e => e.fromNode === node.id || e.toNode === node.id)
            .map(e => {
              const other = e.fromNode === node.id
                ? FSM.nodes[e.toNode]
                : FSM.nodes[e.fromNode];
              const dir = e.fromNode === node.id ? '→' : '←';
              return `<div class="edge-list-item" onclick="selectEdge('${e.id}')">
                <span class="edge-arrow">${dir}</span>
                ${other ? escHtml(other.name) : '?'}
                ${e.label
                  ? `<span style="color:var(--text-dim);margin-left:auto">${escHtml(e.label)}</span>`
                  : ''}
              </div>`;
            }).join('')
          || '<div style="font-size:11px;color:var(--text-dim);padding:4px">No edges</div>'}
      </div>
    </div>

    <div style="padding-top:4px">
      <button class="btn btn-danger" style="width:100%"
        onclick="deleteSelectedNode()">Delete Node</button>
    </div>
  `;
}

function renderEdgePanel(edge) {
  const content = document.getElementById('panelContent');
  const from    = FSM.nodes[edge.fromNode];
  const to      = FSM.nodes[edge.toNode];

  content.innerHTML = `
    <div class="panel-section">
      <div class="panel-section-title">Edge</div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-bottom:4px">
        id: ${escHtml(edge.id)}
      </div>
      <div style="font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);margin-bottom:10px">
        ${from ? escHtml(from.name) : '?'} → ${to ? escHtml(to.name) : '?'}
      </div>
      <div class="field-group">
        <label class="field-label">Label (遷移条件)</label>
        <input class="field-input" value="${escHtml(edge.label)}"
          onchange="updateEdgeLabel('${edge.id}', this.value)" />
      </div>
    </div>
    <div style="padding-top:4px">
      <button class="btn btn-danger" style="width:100%"
        onclick="deleteSelectedEdge()">Delete Edge</button>
    </div>
  `;
}


// ============================================================
// INTERACTIONS
// ============================================================

function addNode() {
  const canvasRect = document.getElementById('canvas').getBoundingClientRect();
  const x = (canvasRect.width  / 2 - viewOffset.x) / viewScale;
  const y = (canvasRect.height / 2 - viewOffset.y) / viewScale;
  const id = FSM.addNode(
    'New Node',
    x + (Math.random() - 0.5) * 60,
    y + (Math.random() - 0.5) * 40
  );
  markDirty();
  selectNode(id);
  render();
  setTimeout(() => {
    const input = document.querySelector('#panelContent .field-input');
    if (input) { input.focus(); input.select(); }
  }, 50);
}

function selectNode(id) {
  selectedNodeId = id;
  selectedEdgeId = null;
  render();
}

function selectEdge(id) {
  selectedEdgeId = id;
  selectedNodeId = null;
  render();
}

function deselect() {
  selectedNodeId = null;
  selectedEdgeId = null;
  render();
}

function updateNodeName(id, name) {
  if (FSM.nodes[id]) {
    FSM.nodes[id].name = name;
    markDirty();
    render();
  }
}

function updateNodeSize(id, w, h) {
  const node = FSM.nodes[id];
  if (!node) return;
  if (w !== null && w !== undefined) node.width  = Math.max(80,  parseInt(w) || DEFAULT_NODE_W);
  if (h !== null && h !== undefined) node.height = Math.max(40,  parseInt(h) || DEFAULT_NODE_H);
  markDirty();
  render();
}

function setStatus(id, status) {
  if (FSM.nodes[id]) {
    if (status === 'done' && FSM.hasUncheckedValidation(id)) {
      if (!confirm('Validation項目が未チェックです。完了にしますか？')) return;
    }
    FSM.nodes[id].status = status;
    markDirty();
    render();
  }
}

function updateEdgeLabel(id, label) {
  if (FSM.edges[id]) {
    FSM.edges[id].label = label;
    markDirty();
    render();
  }
}

function deleteSelectedNode() {
  if (selectedNodeId) {
    FSM.removeNode(selectedNodeId);
    selectedNodeId = null;
    markDirty();
    render();
  }
}

function deleteSelectedEdge() {
  if (selectedEdgeId) {
    FSM.removeEdge(selectedEdgeId);
    selectedEdgeId = null;
    markDirty();
    render();
  }
}

function addDoDFromInput(nodeId) {
  const input  = document.getElementById('dodAddInput');
  const select = document.getElementById('dodTypeSelect');
  if (!input || !input.value.trim()) return;
  FSM.addDoDItem(nodeId, input.value.trim(), select.value);
  markDirty();
  render();
  setTimeout(() => {
    const newInput = document.getElementById('dodAddInput');
    if (newInput) newInput.focus();
  }, 50);
}

function toggleDoD(nodeId, dodId) {
  const node = FSM.nodes[nodeId];
  if (!node) return;
  const item = node.dod.find(d => d.id === dodId);
  if (item) {
    item.checked = !item.checked;
    if (FSM.allDoDChecked(nodeId) && !FSM.hasUncheckedValidation(nodeId)) {
      node.status = 'done';
    }
    markDirty();
    render();
  }
}

function removeDoDItem(nodeId, dodId) {
  FSM.removeDoDItem(nodeId, dodId);
  markDirty();
  render();
}

function toggleEdgeMode() {
  edgeMode = !edgeMode;
  edgeModeSource = null;
  document.getElementById('edgeModeBtn').classList.toggle('btn-accent', edgeMode);
  document.getElementById('edgeModeBanner').classList.toggle('active', edgeMode);
  document.getElementById('canvas').style.cursor = edgeMode ? 'crosshair' : 'grab';
}

function onNodeClick(e, id) {
  e.stopPropagation();
  if (edgeMode) {
    if (!edgeModeSource) {
      edgeModeSource = id;
      document.getElementById('edgeModeBanner').textContent =
        `Edge: ${FSM.nodes[id].name} → ? (click target)  |  ESC to cancel`;
    } else {
      FSM.addEdge(edgeModeSource, id, '');
      edgeModeSource = null;
      markDirty();
      toggleEdgeMode();
      render();
    }
  } else {
    selectNode(id);
  }
}

function onNodeMouseDown(e, id) {
  if (edgeMode || e.button !== 0) return;
  e.stopPropagation();
  dragging = {
    id,
    startX: e.clientX, startY: e.clientY,
    origX: FSM.nodes[id].x, origY: FSM.nodes[id].y,
    moved: false
  };
}

document.addEventListener('mousemove', e => {
  if (dragging) {
    const dx = (e.clientX - dragging.startX) / viewScale;
    const dy = (e.clientY - dragging.startY) / viewScale;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) dragging.moved = true;
    FSM.nodes[dragging.id].x = dragging.origX + dx;
    FSM.nodes[dragging.id].y = dragging.origY + dy;
    render();
  }
  if (panState) {
    viewOffset.x = panState.origOffX + (e.clientX - panState.startX);
    viewOffset.y = panState.origOffY + (e.clientY - panState.startY);
    applyView();
  }
});

document.addEventListener('mouseup', () => {
  if (dragging && dragging.moved) markDirty();
  dragging  = null;
  panState  = null;
});

document.getElementById('canvas').addEventListener('mousedown', e => {
  if (e.target === document.getElementById('canvas') ||
      e.target === document.getElementById('svgCanvas') ||
      e.target.tagName === 'svg') {
    if (edgeMode) {
      if (edgeModeSource) edgeModeSource = null;
      return;
    }
    panState = {
      startX: e.clientX, startY: e.clientY,
      origOffX: viewOffset.x, origOffY: viewOffset.y
    };
  }
});

document.getElementById('canvas').addEventListener('click', e => {
  if (e.target === document.getElementById('canvas') ||
      e.target === document.getElementById('svgCanvas') ||
      (e.target.closest('svg') === document.getElementById('svgCanvas') &&
       !e.target.closest('.fsm-node') &&
       !e.target.closest('.fsm-edge'))) {
    if (!edgeMode && !panState) deselect();
  }
});

document.getElementById('canvas').addEventListener('wheel', e => {
  e.preventDefault();
  const delta    = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.max(0.2, Math.min(3, viewScale * delta));
  const rect     = document.getElementById('canvas').getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  viewOffset.x = mx - (mx - viewOffset.x) * (newScale / viewScale);
  viewOffset.y = my - (my - viewOffset.y) * (newScale / viewScale);
  viewScale = newScale;
  applyView();
}, { passive: false });

function applyView() {
  const ng = document.getElementById('nodesGroup');
  const eg = document.getElementById('edgesGroup');
  const t  = `translate(${viewOffset.x}px, ${viewOffset.y}px) scale(${viewScale})`;
  ng.style.transform       = t;
  eg.style.transform       = t;
  ng.style.transformOrigin = '0 0';
  eg.style.transformOrigin = '0 0';
}

function fitView() {
  const nodes = Object.values(FSM.nodes);
  if (nodes.length === 0) {
    viewOffset = { x: 0, y: 0 };
    viewScale  = 1;
    applyView();
    return;
  }
  const rect = document.getElementById('canvas').getBoundingClientRect();
  const pad  = 80;
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    minX = Math.min(minX, n.x - n.width  / 2);
    maxX = Math.max(maxX, n.x + n.width  / 2);
    minY = Math.min(minY, n.y - n.height / 2);
    maxY = Math.max(maxY, n.y + n.height / 2);
  });
  const w = maxX - minX + pad * 2;
  const h = maxY - minY + pad * 2;
  viewScale    = Math.min(1.5, Math.min(rect.width / w, rect.height / h));
  viewOffset.x = (rect.width  - w * viewScale) / 2 - minX * viewScale + pad * viewScale;
  viewOffset.y = (rect.height - h * viewScale) / 2 - minY * viewScale + pad * viewScale;
  applyView();
}

function onNodeContext(e, id) {
  e.preventDefault();
  e.stopPropagation();
  selectNode(id);
  showContextMenu(e.clientX, e.clientY, [
    { label: 'ステータス: 未着手', action: () => setStatus(id, 'idle') },
    { label: 'ステータス: 実装中', action: () => setStatus(id, 'wip')  },
    { label: 'ステータス: 完了',   action: () => setStatus(id, 'done') },
    { type: 'separator' },
    { label: '削除', danger: true, action: () => {
        FSM.removeNode(id);
        selectedNodeId = null;
        render();
    }}
  ]);
}

function onEdgeContext(e, id) {
  e.preventDefault();
  e.stopPropagation();
  selectEdge(id);
  showContextMenu(e.clientX, e.clientY, [
    { label: '削除', danger: true, action: () => {
        FSM.removeEdge(id);
        selectedEdgeId = null;
        render();
    }}
  ]);
}

function showContextMenu(x, y, items) {
  const menu = document.getElementById('contextMenu');
  menu.innerHTML = items.map(item => {
    if (item.type === 'separator')
      return '<div style="height:1px;background:var(--border-dim);margin:4px 0"></div>';
    return `<div class="context-menu-item ${item.danger ? 'danger' : ''}">${item.label}</div>`;
  }).join('');
  menu.style.left = x + 'px';
  menu.style.top  = y + 'px';
  menu.classList.add('active');

  const menuItems = menu.querySelectorAll('.context-menu-item');
  let idx = 0;
  items.forEach(item => {
    if (item.type === 'separator') return;
    menuItems[idx].addEventListener('click', () => {
      item.action();
      menu.classList.remove('active');
    });
    idx++;
  });
}

document.addEventListener('click', () => {
  document.getElementById('contextMenu').classList.remove('active');
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (edgeMode) toggleEdgeMode();
    document.getElementById('contextMenu').classList.remove('active');
    if (document.getElementById('modalOverlay').classList.contains('active')) closeModal();
  }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (document.activeElement.tagName === 'INPUT' ||
        document.activeElement.tagName === 'TEXTAREA') return;
    if (selectedNodeId) deleteSelectedNode();
    if (selectedEdgeId) deleteSelectedEdge();
  }
});


// ============================================================
// JSON IMPORT / EXPORT
// ============================================================

function showExportModal() {
  clearDirty();
  document.getElementById('modalTitle').textContent        = 'Export JSON (Canvas Schema)';
  document.getElementById('modalTextarea').value           = FSM.toJSON();
  document.getElementById('modalTextarea').readOnly        = true;
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn" onclick="copyExport()">Copy</button>
    <button class="btn" onclick="closeModal()">Close</button>
  `;
  document.getElementById('modalOverlay').classList.add('active');
}

function showImportModal() {
  document.getElementById('modalTitle').textContent        = 'Import JSON (Canvas / Legacy)';
  document.getElementById('modalTextarea').value           = '';
  document.getElementById('modalTextarea').readOnly        = false;
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn btn-accent" onclick="doImport()">Import</button>
    <button class="btn" onclick="closeModal()">Cancel</button>
  `;
  document.getElementById('modalOverlay').classList.add('active');
  document.getElementById('modalTextarea').focus();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

function copyExport() {
  const ta = document.getElementById('modalTextarea');
  ta.select();
  navigator.clipboard.writeText(ta.value);
}

function doImport() {
  try {
    FSM.fromJSON(document.getElementById('modalTextarea').value);
    selectedNodeId = null;
    selectedEdgeId = null;
    clearDirty();
    closeModal();
    render();
    fitView();
  } catch (err) {
    alert('JSON parse error: ' + err.message);
  }
}


// ============================================================
// UTILS
// ============================================================

function escHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}


// ============================================================
// INIT — サンプルデータ (PDCA / Canvas JSON スキーマ)
// ============================================================

(function init() {
  const s1 = FSM.addNode('Plan',  300,  50);
  const s2 = FSM.addNode('Do',    300, 300);
  const s3 = FSM.addNode('Check', 600, 300);
  const s4 = FSM.addNode('Act',   600,  50);

  FSM.addEdge(s1, s2, 'plan');
  FSM.addEdge(s2, s3, 'do');
  FSM.addEdge(s2, s2, 'do');
  FSM.addEdge(s3, s4, 'check');
  FSM.addEdge(s4, s1, 'act');

  FSM.addDoDItem(s1, 'verification1', 'verification');
  FSM.addDoDItem(s1, 'validation1',   'validation');
  FSM.addDoDItem(s2, 'verification2', 'verification');
  FSM.addDoDItem(s2, 'validation2',   'validation');
  FSM.addDoDItem(s3, 'verification3-1', 'verification');
  FSM.addDoDItem(s3, 'verification3-2', 'verification');
  FSM.addDoDItem(s4, 'validation4-1',   'verification');
  FSM.addDoDItem(s4, 'validation4-2',   'validation');

  render();
  setTimeout(fitView, 100);
  // init完了時点はclean状態 (markDirty不要)
})();
</script>
