<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSM Task Board</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Sans+JP:wght@400;500;600&display=swap');

:root {
  --bg-primary: #f7f7f8;
  --bg-secondary: #ffffff;
  --bg-tertiary: #f0f0f3;
  --bg-panel: #ffffff;
  --bg-hover: #e8e8ec;
  --border-dim: #e0e0e8;
  --border-mid: #c8c8d4;
  --border-bright: #9898a8;
  --text-primary: #18181b;
  --text-secondary: #3f3f46;
  --text-dim: #888898;
  --accent-idle: #8080a0;
  --accent-wip: #c87000;
  --accent-done: #15803d;
  --accent-validation: #7c3aed;
  --accent-verification: #1d6ac4;
  --accent-danger: #dc2626;
  --accent-edge: #9090a8;
  --shadow-glow: 0 0 20px rgba(100, 100, 130, 0.12);
  --font-mono: 'JetBrains Mono', monospace;
  --font-sans: 'IBM Plex Sans', 'IBM Plex Sans JP', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
}

/* === LAYOUT === */
.app {
  display: grid;
  grid-template-columns: 1fr 340px;
  grid-template-rows: 48px 1fr;
  height: 100vh;
}

/* === TOOLBAR === */
.toolbar {
  grid-column: 1 / -1;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-dim);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
  z-index: 100;
}

.toolbar-title {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--text-secondary);
  text-transform: uppercase;
  margin-right: 16px;
  user-select: none;
}

.toolbar-title span { color: var(--accent-wip); }

.toolbar-sep {
  width: 1px;
  height: 24px;
  background: var(--border-dim);
  margin: 0 4px;
}

.btn {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.03em;
  padding: 6px 12px;
  border: 1px solid var(--border-mid);
  border-radius: 4px;
  background: var(--bg-tertiary);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.btn:hover {
  background: var(--bg-hover);
  border-color: var(--border-bright);
  color: var(--text-primary);
}

.btn-accent {
  border-color: var(--accent-wip);
  color: var(--accent-wip);
}

.btn-accent:hover { background: rgba(200, 112, 0, 0.08); }

.btn-danger {
  border-color: var(--accent-danger);
  color: var(--accent-danger);
}

.btn-danger:hover { background: rgba(220, 38, 38, 0.08); }

.toolbar-right {
  margin-left: auto;
  display: flex;
  gap: 8px;
  align-items: center;
}

/* === CANVAS === */
.canvas-area {
  position: relative;
  overflow: hidden;
  background: var(--bg-primary);
  cursor: grab;
}

.canvas-area:active { cursor: grabbing; }

.canvas-area svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

.canvas-area::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: radial-gradient(circle, var(--border-mid) 1px, transparent 1px);
  background-size: 24px 24px;
  opacity: 0.6;
  pointer-events: none;
  z-index: 0;
}

/* === NODES === */
.fsm-node { cursor: pointer; user-select: none; }
.fsm-node:hover .node-body { filter: brightness(0.96); }

.node-body { rx: 6; ry: 6; transition: filter 0.15s; }

.node-label {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  fill: var(--text-primary);
  pointer-events: none;
  text-anchor: middle;
  dominant-baseline: central;
}

.node-status-indicator {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 500;
  pointer-events: none;
  text-anchor: middle;
}

.node-selected .node-body {
  stroke-width: 2;
  filter: drop-shadow(0 0 6px rgba(200, 112, 0, 0.25));
}

/* === EDGES === */
.fsm-edge { cursor: pointer; }

.edge-line {
  fill: none;
  stroke: var(--accent-edge);
  stroke-width: 1.5;
  marker-end: url(#arrowhead);
  transition: stroke 0.15s;
}

.fsm-edge:hover .edge-line { stroke: var(--text-secondary); stroke-width: 2; }

.edge-label-bg { fill: var(--bg-primary); rx: 3; ry: 3; }

.edge-label {
  font-family: var(--font-mono);
  font-size: 10px;
  fill: var(--text-dim);
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
}

/* === SIDE PANEL === */
.side-panel {
  background: var(--bg-secondary);
  border-left: 1px solid var(--border-dim);
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.panel-section {
  background: var(--bg-tertiary);
  border: 1px solid var(--border-dim);
  border-radius: 6px;
  padding: 12px;
}

.panel-section-title {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 10px;
}

.panel-empty {
  font-size: 12px;
  color: var(--text-dim);
  text-align: center;
  padding: 32px 16px;
  line-height: 1.6;
}

/* === FORM ELEMENTS === */
.field-group { margin-bottom: 10px; }

.field-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  color: var(--text-dim);
  margin-bottom: 4px;
  display: block;
}

.field-input {
  width: 100%;
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 6px 8px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-dim);
  border-radius: 4px;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.15s;
}

.field-input:focus { border-color: var(--border-bright); }

/* === STATUS TOGGLE === */
.status-toggle { display: flex; gap: 4px; }

.status-option {
  flex: 1;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  padding: 5px 4px;
  border: 1px solid var(--border-dim);
  border-radius: 3px;
  background: var(--bg-secondary);
  color: var(--text-dim);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}

.status-option:hover { border-color: var(--border-mid); }
.status-option.active-idle { border-color: var(--accent-idle); color: var(--accent-idle); background: rgba(128,128,160,0.08); }
.status-option.active-wip  { border-color: var(--accent-wip);  color: var(--accent-wip);  background: rgba(200,112,0,0.08); }
.status-option.active-done { border-color: var(--accent-done); color: var(--accent-done); background: rgba(21,128,61,0.08); }

/* === DoD LIST === */
.dod-list { display: flex; flex-direction: column; gap: 6px; }

.dod-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 8px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-dim);
  border-radius: 4px;
  font-size: 12px;
  transition: border-color 0.15s;
}

.dod-item.type-verification { border-left: 3px solid var(--accent-verification); }
.dod-item.type-validation   { border-left: 3px solid var(--accent-validation); }

.dod-check { margin-top: 2px; cursor: pointer; accent-color: var(--accent-done); flex-shrink: 0; }

.dod-text {
  flex: 1;
  font-family: var(--font-sans);
  color: var(--text-secondary);
  line-height: 1.4;
  word-break: break-word;
}

.dod-item.checked .dod-text { text-decoration: line-through; color: var(--text-dim); }

.dod-type-badge {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 2px;
  flex-shrink: 0;
  letter-spacing: 0.03em;
}

.dod-type-badge.verification { color: var(--accent-verification); background: rgba(29,106,196,0.1); }
.dod-type-badge.validation   { color: var(--accent-validation);   background: rgba(124,58,237,0.1); }

.dod-actions { display: flex; gap: 4px; flex-shrink: 0; }

.dod-action-btn {
  font-size: 11px;
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  border: none; background: transparent;
  color: var(--text-dim); cursor: pointer; border-radius: 2px;
}

.dod-action-btn:hover { background: var(--bg-hover); color: var(--text-secondary); }

.dod-add-row { display: flex; gap: 4px; margin-top: 4px; }

.dod-add-input {
  flex: 1;
  font-family: var(--font-sans);
  font-size: 11px;
  padding: 5px 8px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-dim);
  border-radius: 3px;
  color: var(--text-primary);
  outline: none;
}

.dod-add-input:focus { border-color: var(--border-mid); }

.dod-type-select {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 4px 6px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-dim);
  border-radius: 3px;
  color: var(--text-secondary);
  outline: none; cursor: pointer;
}

/* === EDGE PANEL === */
.edge-list { display: flex; flex-direction: column; gap: 4px; }

.edge-list-item {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 8px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-dim);
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-secondary);
  cursor: pointer;
  transition: border-color 0.15s;
}

.edge-list-item:hover { border-color: var(--border-mid); }
.edge-arrow { color: var(--text-dim); }

/* === VALIDATION GATE === */
.validation-gate {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 8px;
  background: rgba(124,58,237,0.05);
  border: 1px solid rgba(124,58,237,0.2);
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--accent-validation);
  margin-top: 8px;
}

.validation-gate-icon { font-size: 14px; }

/* === EDGE CREATION MODE === */
.edge-mode-banner {
  position: fixed;
  top: 56px; left: 50%; transform: translateX(-50%);
  background: var(--bg-panel);
  border: 1px solid var(--accent-wip);
  border-radius: 6px;
  padding: 8px 16px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--accent-wip);
  z-index: 200;
  box-shadow: var(--shadow-glow);
  display: none;
}

.edge-mode-banner.active { display: block; }

/* === JSON MODAL === */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3);
  z-index: 1000; display: none;
  align-items: center; justify-content: center;
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border-mid);
  border-radius: 8px;
  width: 600px; max-height: 80vh;
  display: flex; flex-direction: column;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}

.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-dim);
}

.modal-title {
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 0.05em;
}

.modal-body { padding: 16px; overflow-y: auto; flex: 1; }

.modal-textarea {
  width: 100%; min-height: 300px;
  font-family: var(--font-mono);
  font-size: 11px; line-height: 1.5;
  padding: 12px;
  background: var(--bg-primary);
  border: 1px solid var(--border-dim);
  border-radius: 4px;
  color: var(--text-primary);
  resize: vertical; outline: none;
}

.modal-footer {
  display: flex; justify-content: flex-end; gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid var(--border-dim);
}

/* === CONTEXT MENU === */
.context-menu {
  position: fixed;
  background: var(--bg-panel);
  border: 1px solid var(--border-mid);
  border-radius: 6px;
  padding: 4px;
  z-index: 500;
  display: none; min-width: 160px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}

.context-menu.active { display: block; }

.context-menu-item {
  font-family: var(--font-mono);
  font-size: 11px; padding: 6px 12px;
  color: var(--text-secondary);
  cursor: pointer; border-radius: 3px;
  transition: background 0.1s;
}

.context-menu-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.context-menu-item.danger { color: var(--accent-danger); }
.context-menu-item.danger:hover { background: rgba(220,38,38,0.08); }

/* === DIRTY BADGE === */
.dirty-badge {
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 600;
  color: var(--accent-wip);
  display: none; align-items: center; gap: 4px;
  padding: 3px 8px;
  border: 1px solid var(--accent-wip);
  border-radius: 3px;
  background: rgba(200,112,0,0.06);
  animation: dirty-pulse 2s ease-in-out infinite;
}

.dirty-badge.visible { display: flex; }

@keyframes dirty-pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.55; }
}

/* === LEGEND === */
.legend {
  position: absolute;
  bottom: 12px; left: 12px;
  display: flex; gap: 12px;
  font-family: var(--font-mono);
  font-size: 9px; color: var(--text-dim);
  z-index: 10; pointer-events: none;
}

.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-swatch { width: 8px; height: 8px; border-radius: 2px; }

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }
</style>
</head>
<body>

<div class="app">
  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="toolbar-title">FSM<span>:</span>Task Board</div>
    <button class="btn" onclick="addNode()" title="Add Node">+ Node</button>
    <button class="btn" id="edgeModeBtn" onclick="toggleEdgeMode()" title="Add Edge">+ Edge</button>
    <div class="toolbar-sep"></div>
    <button class="btn" onclick="fitView()">Fit View</button>
    <div class="toolbar-right">
      <div class="dirty-badge" id="dirtyBadge">● 未保存</div>
      <button class="btn" onclick="showImportModal()">Import JSON</button>
      <button class="btn btn-accent" onclick="showExportModal()">Export JSON</button>
    </div>
  </div>

  <!-- CANVAS -->
  <div class="canvas-area" id="canvas">
    <svg id="svgCanvas" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrowhead" viewBox="0 0 10 7" refX="10" refY="3.5"
          markerWidth="8" markerHeight="6" orient="auto-start-reverse">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--accent-edge)" />
        </marker>
      </defs>
      <g id="edgesGroup"></g>
      <g id="nodesGroup"></g>
    </svg>
    <div class="legend">
      <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-idle)"></div> 未着手</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-wip)"></div> 実装中</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-done)"></div> 完了</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-verification)"></div> Verification</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--accent-validation)"></div> Validation</div>
    </div>
    <div class="edge-mode-banner" id="edgeModeBanner">
      Edge Mode: click source → click target &nbsp;|&nbsp; ESC to cancel
    </div>
  </div>

  <!-- SIDE PANEL -->
  <div class="side-panel" id="sidePanel">
    <div class="panel-empty" id="panelEmpty">
      クリックでノード選択<br>
      <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim)">
        右クリックでコンテキストメニュー
      </span>
    </div>
    <div id="panelContent" style="display:none"></div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div class="context-menu" id="contextMenu"></div>

<!-- JSON MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Export JSON</span>
      <button class="btn" onclick="window.__fsm.closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <textarea class="modal-textarea" id="modalTextarea" spellcheck="false"></textarea>
    </div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script>
// ============================================================
// UTILS — 汎用ユーティリティ
// ============================================================

function escHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ============================================================
// UI STATE — グローバル状態オブジェクト
// interaction / ui 層が参照・更新する共有状態。
// ============================================================

const uiState = {
  selectedNodeId: null,
  selectedEdgeId: null,
  edgeMode:       false,
  edgeModeSource: null,
  dragging:       null,
  panState:       null,
  viewOffset:     { x: 0, y: 0 },
  viewScale:      1,
  isDirty:        false,
};

// ============================================================
// FSM TASK BOARD — Core Data Model
// DOM依存ゼロ。テスト可能な純粋データ操作層。
//
// JSON Schema準拠:
//   nodes[]      — Canvas必須 (旧: states[])
//   edges[].id   — Canvas必須
//   edges[].fromNode / toNode — Canvas必須 (旧: from / to)
//   node.width / height      — Canvas必須
//   node.status / dod        — 独自拡張フィールド
// ============================================================

const DEFAULT_NODE_W = 160;
const DEFAULT_NODE_H = 56;

const FSM = {
  nodes: {},   // Canvas準拠: 旧 states
  edges: {},
  _idCounter: 0,
  _edgeIdCounter: 0,

  genId()     { return 's' + (++this._idCounter); },
  genEdgeId() { return 'e' + (++this._edgeIdCounter); },

  addNode(name, x, y, width, height) {
    const id = this.genId();
    this.nodes[id] = {
      id,
      name,
      x,
      y,
      width:  width  || DEFAULT_NODE_W,
      height: height || DEFAULT_NODE_H,
      status: 'idle',
      dod: []
    };
    return id;
  },

  addEdge(fromNode, toNode, label) {
    const id = this.genEdgeId();
    this.edges[id] = { id, fromNode, toNode, label: label || '' };
    return id;
  },

  removeNode(id) {
    delete this.nodes[id];
    Object.keys(this.edges).forEach(eid => {
      const e = this.edges[eid];
      if (e.fromNode === id || e.toNode === id) delete this.edges[eid];
    });
  },

  removeEdge(id) { delete this.edges[id]; },

  addDoDItem(nodeId, text, type) {
    const node = this.nodes[nodeId];
    if (!node) return;
    const item = {
      id: 'd' + Date.now() + Math.random().toString(36).slice(2, 5),
      text, type: type || 'verification', checked: false
    };
    node.dod.push(item);
    return item;
  },

  removeDoDItem(nodeId, dodId) {
    const node = this.nodes[nodeId];
    if (!node) return;
    node.dod = node.dod.filter(d => d.id !== dodId);
  },

  hasUncheckedValidation(nodeId) {
    const node = this.nodes[nodeId];
    if (!node) return false;
    return node.dod.some(d => d.type === 'validation' && !d.checked);
  },

  allDoDChecked(nodeId) {
    const node = this.nodes[nodeId];
    if (!node || node.dod.length === 0) return false;
    return node.dod.every(d => d.checked);
  },

  // -------------------------------------------------------
  // Canvas JSON Schema Export
  // -------------------------------------------------------
  toJSON() {
    return JSON.stringify({
      nodes: Object.values(this.nodes).map(n => ({
        id:     n.id,
        name:   n.name,
        x:      Math.round(n.x),
        y:      Math.round(n.y),
        width:  n.width,
        height: n.height,
        status: n.status,
        dod: n.dod.map(d => ({
          text:    d.text,
          type:    d.type,
          checked: d.checked
        }))
      })),
      edges: Object.values(this.edges).map(e => ({
        id:       e.id,
        fromNode: e.fromNode,
        toNode:   e.toNode,
        label:    e.label
      }))
    }, null, 2);
  },

  // -------------------------------------------------------
  // Canvas JSON Schema Import
  // (後方互換: states[] / from / to も受容)
  // -------------------------------------------------------
  fromJSON(json) {
    const data = typeof json === 'string' ? JSON.parse(json) : json;
    this.nodes = {};
    this.edges = {};
    this._idCounter = 0;
    this._edgeIdCounter = 0;

    const rawNodes = data.nodes || data.states || [];
    rawNodes.forEach(n => {
      const id = n.id || this.genId();
      const numId = parseInt(id.replace('s', ''));
      if (!isNaN(numId) && numId > this._idCounter) this._idCounter = numId;
      this.nodes[id] = {
        id,
        name:   n.name,
        x:      n.x,
        y:      n.y,
        width:  n.width  || DEFAULT_NODE_W,
        height: n.height || DEFAULT_NODE_H,
        status: n.status || 'idle',
        dod: (n.dod || []).map(d => ({
          id:      'd' + Date.now() + Math.random().toString(36).slice(2, 5),
          text:    d.text,
          type:    d.type || 'verification',
          checked: d.checked || false
        }))
      };
    });

    (data.edges || []).forEach(e => {
      const id = e.id || this.genEdgeId();
      const numId = parseInt(id.replace('e', ''));
      if (!isNaN(numId) && numId > this._edgeIdCounter) this._edgeIdCounter = numId;
      this.edges[id] = {
        id,
        fromNode: e.fromNode || e.from,
        toNode:   e.toNode   || e.to,
        label:    e.label || ''
      };
    });
  }
};

// ============================================================

function markDirty() {
  uiState.isDirty = true;
  document.getElementById('dirtyBadge').classList.add('visible');
}

function clearDirty() {
  uiState.isDirty = false;
  document.getElementById('dirtyBadge').classList.remove('visible');
}

function initBeforeUnload() {
  window.addEventListener('beforeunload', e => {
    if (!uiState.isDirty) return;
    e.preventDefault();
    e.returnValue = '';
  });
}

  const empty   = document.getElementById('panelEmpty');
  const content = document.getElementById('panelContent');

  if (uiState.selectedNodeId && FSM.nodes[uiState.selectedNodeId]) {
    empty.style.display   = 'none';
    content.style.display = 'block';

    renderEdgePanel(FSM.edges[uiState.selectedEdgeId]);

    content.style.display = 'none';

}

// ============================================================
// RENDERER — SVG描画層
// 状態を受け取って描画する副作用関数群。DOM操作のみ担当。
// ============================================================

function statusColor(status) {
  return status === 'wip'  ? 'var(--accent-wip)'  :
         status === 'done' ? 'var(--accent-done)'  :
                             'var(--accent-idle)';
}

function statusLabel(status) {
  return status === 'wip'  ? '実装中' :
         status === 'done' ? '完了'   : '未着手';
}

function render() {
  renderEdges();
  renderNodes();
  renderSidePanel();
}

function applyView() {
  const ng = document.getElementById('nodesGroup');
  const eg = document.getElementById('edgesGroup');
  const { viewOffset, viewScale } = uiState;
  const t  = `translate(${viewOffset.x}px, ${viewOffset.y}px) scale(${viewScale})`;
  ng.style.transform       = t;
  eg.style.transform       = t;
  ng.style.transformOrigin = '0 0';
  eg.style.transformOrigin = '0 0';
}

function fitView() {
  const nodes = Object.values(FSM.nodes);
  if (nodes.length === 0) {
    uiState.viewOffset = { x: 0, y: 0 };
    uiState.viewScale  = 1;
    applyView();
    return;
  }
  const rect = document.getElementById('canvas').getBoundingClientRect();
  const pad  = 80;
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    minX = Math.min(minX, n.x - n.width  / 2);
    maxX = Math.max(maxX, n.x + n.width  / 2);
    minY = Math.min(minY, n.y - n.height / 2);
    maxY = Math.max(maxY, n.y + n.height / 2);
  });
  const w = maxX - minX + pad * 2;
  const h = maxY - minY + pad * 2;
  uiState.viewScale    = Math.min(1.5, Math.min(rect.width / w, rect.height / h));
  uiState.viewOffset.x = (rect.width  - w * uiState.viewScale) / 2 - minX * uiState.viewScale + pad * uiState.viewScale;
  uiState.viewOffset.y = (rect.height - h * uiState.viewScale) / 2 - minY * uiState.viewScale + pad * uiState.viewScale;
  applyView();
}

// -------------------------------------------------------
// Nodes
// -------------------------------------------------------

function renderNodes() {
  const g = document.getElementById('nodesGroup');
  g.innerHTML = '';

  Object.values(FSM.nodes).forEach(node => {
    const nw = node.width;
    const nh = node.height;

    const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    group.classList.add('fsm-node');
    if (node.id === uiState.selectedNodeId) group.classList.add('node-selected');
    group.setAttribute('transform', `translate(${node.x}, ${node.y})`);

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.classList.add('node-body');
    rect.setAttribute('x', -nw / 2);
    rect.setAttribute('y', -nh / 2);
    rect.setAttribute('width',  nw);
    rect.setAttribute('height', nh);
    rect.setAttribute('fill',   'var(--bg-secondary)');
    rect.setAttribute('stroke', statusColor(node.status));
    rect.setAttribute('stroke-width', node.id === uiState.selectedNodeId ? '2' : '1.5');

    if (FSM.hasUncheckedValidation(node.id)) {
      rect.setAttribute('stroke-dasharray', '6 3');
    }
    group.appendChild(rect);

    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.classList.add('node-label');
    label.setAttribute('y', -6);
    label.textContent = node.name.length > 14
      ? node.name.slice(0, 13) + '…'
      : node.name;
    group.appendChild(label);

    const statusText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    statusText.classList.add('node-status-indicator');
    statusText.setAttribute('y', 12);
    statusText.setAttribute('fill', statusColor(node.status));
    const dodDone  = node.dod.filter(d => d.checked).length;
    const dodTotal = node.dod.length;
    const dodStr   = dodTotal > 0 ? ` [${dodDone}/${dodTotal}]` : '';
    statusText.textContent = statusLabel(node.status) + dodStr;
    group.appendChild(statusText);

    group._nodeId = node.id;
    g.appendChild(group);
  });
}

// -------------------------------------------------------
// Edges
// -------------------------------------------------------

function renderEdges() {
  const g = document.getElementById('edgesGroup');
  g.innerHTML = '';

  const edges = Object.values(FSM.edges);

  const parallelGroups = {};
  const selfLoopGroups = {};

  edges.forEach(e => {
    if (e.fromNode === e.toNode) {
      if (!selfLoopGroups[e.fromNode]) selfLoopGroups[e.fromNode] = [];
      selfLoopGroups[e.fromNode].push(e.id);
    } else {
      const key = `${e.fromNode}→${e.toNode}`;
      if (!parallelGroups[key]) parallelGroups[key] = [];
      parallelGroups[key].push(e.id);
    }
  });

  const edgeLayout = {};

  Object.entries(parallelGroups).forEach(([key, ids]) => {
    const [fn, tn] = key.split('→');
    const hasBidi  = !!parallelGroups[`${tn}→${fn}`];
    ids.forEach((id, i) => {
      edgeLayout[id] = { index: i, groupSize: ids.length, hasBidi };
    });
  });

  Object.entries(selfLoopGroups).forEach(([, ids]) => {
    ids.forEach((id, i) => {
      edgeLayout[id] = { loopIndex: i, loopGroupSize: ids.length };
    });
  });

  const STEP      = 30;
  const BIDI_BASE = 15;

  edges.forEach(edge => {
    const from = FSM.nodes[edge.fromNode];
    const to   = FSM.nodes[edge.toNode];
    if (!from || !to) return;

    const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    group.classList.add('fsm-edge');

    const layout = edgeLayout[edge.id];

    if (edge.fromNode === edge.toNode) {
      const { loopIndex, loopGroupSize } = layout;
      const spread = loopGroupSize > 1 ? loopIndex / (loopGroupSize - 1) : 0.5;
      const loopW  = 44 + spread * 20;
      const loopH  = 48 + loopIndex * 20;

      const cx = from.x;
      const cy = from.y - from.height / 2;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.classList.add('edge-line');
      path.setAttribute('d',
        `M ${cx - loopW/2} ${cy}` +
        ` C ${cx - loopW} ${cy - loopH},` +
        `   ${cx + loopW} ${cy - loopH},` +
        `   ${cx + loopW/2} ${cy}`
      );
      group.appendChild(path);
      if (edge.label) addEdgeLabel(group, cx, cy - loopH + 8, edge.label);

    } else {
      const { index, groupSize, hasBidi } = layout;

      const angle = Math.atan2(to.y - from.y, to.x - from.x);
      const x1 = from.x + Math.cos(angle) * (from.width  / 2 + 2);
      const y1 = from.y + Math.sin(angle) * (from.height / 2 + 2);
      const x2 = to.x   - Math.cos(angle) * (to.width    / 2 + 8);
      const y2 = to.y   - Math.sin(angle) * (to.height   / 2 + 8);

      const parallelOffset = (index - (groupSize - 1) / 2) * STEP;
      const bidiOffset     = hasBidi ? BIDI_BASE : 0;
      const totalOffset    = parallelOffset + bidiOffset;

      if (totalOffset === 0) {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.classList.add('edge-line');
        line.setAttribute('x1', x1); line.setAttribute('y1', y1);
        line.setAttribute('x2', x2); line.setAttribute('y2', y2);
        group.appendChild(line);
        if (edge.label) addEdgeLabel(group, (x1+x2)/2, (y1+y2)/2, edge.label);

      } else {
        const dx  = x2 - x1, dy = y2 - y1;
        const len = Math.sqrt(dx*dx + dy*dy) || 1;
        const nx = -dy / len;
        const ny =  dx / len;
        const mx = (x1+x2)/2 + nx * totalOffset;
        const my = (y1+y2)/2 + ny * totalOffset;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.classList.add('edge-line');
        path.setAttribute('d', `M ${x1} ${y1} Q ${mx} ${my} ${x2} ${y2}`);
        group.appendChild(path);
        if (edge.label) addEdgeLabel(group, mx, my, edge.label);
      }
    }

    group._edgeId = edge.id;
    g.appendChild(group);
  });
}

function addEdgeLabel(group, x, y, text) {
  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bg.classList.add('edge-label-bg');
  const textLen = text.length * 6 + 12;
  bg.setAttribute('x', x - textLen / 2);
  bg.setAttribute('y', y - 8);
  bg.setAttribute('width',  textLen);
  bg.setAttribute('height', 16);
  group.appendChild(bg);

  const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  label.classList.add('edge-label');
  label.setAttribute('x', x);
  label.setAttribute('y', y);
  label.textContent = text;
  group.appendChild(label);
}

// ============================================================
// EVENTS — イベントハンドラ層
// イベント委譲（Event Delegation）パターンを採用。
// renderer.js との循環依存を回避するため、
// nodesGroup / edgesGroup に対してまとめてリスナーを設定する。
// ============================================================

// render / applyView / fitView は main から注入
let _renderFn    = null;
let _applyViewFn = null;

function initEvents(renderFn, applyViewFn) {
  _renderFn    = renderFn;
  _applyViewFn = applyViewFn;

  // ノードグループへの委譲リスナー
  const ng = document.getElementById('nodesGroup');
  ng.addEventListener('mousedown', e => {
    const g = e.target.closest('.fsm-node');
    if (!g || e.button !== 0) return;
    if (uiState.edgeMode) return;
    e.stopPropagation();
    const id = g._nodeId;
    uiState.dragging = {
      id,
      startX: e.clientX, startY: e.clientY,
      origX: FSM.nodes[id].x, origY: FSM.nodes[id].y,
      moved: false
    };
  });

  ng.addEventListener('click', e => {
    const g = e.target.closest('.fsm-node');
    if (!g) return;
    e.stopPropagation();
    onNodeClick(g._nodeId);
  });

  ng.addEventListener('contextmenu', e => {
    const g = e.target.closest('.fsm-node');
    if (!g) return;
    e.preventDefault();
    e.stopPropagation();
    selectNode(g._nodeId);
    showContextMenu(e.clientX, e.clientY, nodeContextItems(g._nodeId));
  });

  // エッジグループへの委譲リスナー
  const eg = document.getElementById('edgesGroup');
  eg.addEventListener('click', e => {
    const g = e.target.closest('.fsm-edge');
    if (!g) return;
    e.stopPropagation();
    selectEdge(g._edgeId);
  });

  eg.addEventListener('contextmenu', e => {
    const g = e.target.closest('.fsm-edge');
    if (!g) return;
    e.preventDefault();
    e.stopPropagation();
    selectEdge(g._edgeId);
    showContextMenu(e.clientX, e.clientY, edgeContextItems(g._edgeId));
  });

  // キャンバスのパン
  const canvas = document.getElementById('canvas');

  canvas.addEventListener('mousedown', e => {
    const svgEl = document.getElementById('svgCanvas');
    if (e.target === canvas || e.target === svgEl || e.target.tagName === 'svg') {
      if (uiState.edgeMode) {
        if (uiState.edgeModeSource) uiState.edgeModeSource = null;
        return;
      }
      uiState.panState = {
        startX: e.clientX, startY: e.clientY,
        origOffX: uiState.viewOffset.x,
        origOffY: uiState.viewOffset.y
      };
    }
  });

  canvas.addEventListener('click', e => {
    const svgEl = document.getElementById('svgCanvas');
    const isBackground =
      e.target === canvas ||
      e.target === svgEl  ||
      (e.target.closest('svg') === svgEl &&
       !e.target.closest('.fsm-node') &&
       !e.target.closest('.fsm-edge'));
    if (isBackground && !uiState.edgeMode && !uiState.panState) {
      deselect();
    }
  });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const delta    = e.deltaY > 0 ? 0.9 : 1.1;
    const newScale = Math.max(0.2, Math.min(3, uiState.viewScale * delta));
    const rect     = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    uiState.viewOffset.x = mx - (mx - uiState.viewOffset.x) * (newScale / uiState.viewScale);
    uiState.viewOffset.y = my - (my - uiState.viewOffset.y) * (newScale / uiState.viewScale);
    uiState.viewScale    = newScale;
    _applyViewFn();
  }, { passive: false });

  // グローバル mousemove / mouseup
  document.addEventListener('mousemove', e => {
    if (uiState.dragging) {
      const dx = (e.clientX - uiState.dragging.startX) / uiState.viewScale;
      const dy = (e.clientY - uiState.dragging.startY) / uiState.viewScale;
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) uiState.dragging.moved = true;
      FSM.nodes[uiState.dragging.id].x = uiState.dragging.origX + dx;
      FSM.nodes[uiState.dragging.id].y = uiState.dragging.origY + dy;
      _renderFn();
    }
    if (uiState.panState) {
      uiState.viewOffset.x = uiState.panState.origOffX + (e.clientX - uiState.panState.startX);
      uiState.viewOffset.y = uiState.panState.origOffY + (e.clientY - uiState.panState.startY);
      _applyViewFn();
    }
  });

  document.addEventListener('mouseup', () => {
    if (uiState.dragging && uiState.dragging.moved) markDirty();
    uiState.dragging = null;
    uiState.panState = null;
  });

  // キーボード
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (uiState.edgeMode) toggleEdgeMode();
      document.getElementById('contextMenu').classList.remove('active');
      if (document.getElementById('modalOverlay').classList.contains('active')) {
        document.getElementById('modalOverlay').classList.remove('active');
      }
    }
    if (e.key === 'Delete' || e.key === 'Backspace') {
      if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
      if (uiState.selectedNodeId) deleteSelectedNode();
      if (uiState.selectedEdgeId) deleteSelectedEdge();
    }
  });

  // コンテキストメニュー閉じ
  document.addEventListener('click', () => {
    document.getElementById('contextMenu').classList.remove('active');
  });
}

// -------------------------------------------------------
// Selection
// -------------------------------------------------------

function selectNode(id) {
  uiState.selectedNodeId = id;
  uiState.selectedEdgeId = null;
  _renderFn();
}

function selectEdge(id) {
  uiState.selectedEdgeId = id;
  uiState.selectedNodeId = null;
  _renderFn();
}

function deselect() {
  uiState.selectedNodeId = null;
  uiState.selectedEdgeId = null;
  _renderFn();
}

// -------------------------------------------------------
// Node click (edge mode 対応)
// -------------------------------------------------------

function onNodeClick(id) {
  if (uiState.edgeMode) {
    if (!uiState.edgeModeSource) {
      uiState.edgeModeSource = id;
      document.getElementById('edgeModeBanner').textContent =
        `Edge: ${FSM.nodes[id].name} → ? (click target)  |  ESC to cancel`;
    } else {
      FSM.addEdge(uiState.edgeModeSource, id, '');
      uiState.edgeModeSource = null;
      markDirty();
      toggleEdgeMode();
      _renderFn();
    }
  } else {
    selectNode(id);
  }
}

// -------------------------------------------------------
// Edge Mode
// -------------------------------------------------------

function toggleEdgeMode() {
  uiState.edgeMode       = !uiState.edgeMode;
  uiState.edgeModeSource = null;
  document.getElementById('edgeModeBtn').classList.toggle('btn-accent', uiState.edgeMode);
  document.getElementById('edgeModeBanner').classList.toggle('active', uiState.edgeMode);
  document.getElementById('canvas').style.cursor = uiState.edgeMode ? 'crosshair' : 'grab';
}

// -------------------------------------------------------
// CRUD actions (panel の onclick から window.__fsm 経由で呼ばれる)
// -------------------------------------------------------

function addNode() {
  const canvasRect = document.getElementById('canvas').getBoundingClientRect();
  const x = (canvasRect.width  / 2 - uiState.viewOffset.x) / uiState.viewScale;
  const y = (canvasRect.height / 2 - uiState.viewOffset.y) / uiState.viewScale;
  const id = FSM.addNode(
    'New Node',
    x + (Math.random() - 0.5) * 60,
    y + (Math.random() - 0.5) * 40
  );
  markDirty();
  selectNode(id);
  setTimeout(() => {
    const input = document.querySelector('#panelContent .field-input');
    if (input) { input.focus(); input.select(); }
  }, 50);
}

function updateNodeName(id, name) {
  if (FSM.nodes[id]) {
    FSM.nodes[id].name = name;
    markDirty();
    _renderFn();
  }
}

function updateNodeSize(id, w, h) {
  const node = FSM.nodes[id];
  if (!node) return;
  if (w !== null && w !== undefined) node.width  = Math.max(80,  parseInt(w) || DEFAULT_NODE_W);
  if (h !== null && h !== undefined) node.height = Math.max(40,  parseInt(h) || DEFAULT_NODE_H);
  markDirty();
  _renderFn();
}

function setStatus(id, status) {
  if (FSM.nodes[id]) {
    if (status === 'done' && FSM.hasUncheckedValidation(id)) {
      if (!confirm('Validation項目が未チェックです。完了にしますか？')) return;
    }
    FSM.nodes[id].status = status;
    markDirty();
    _renderFn();
  }
}

function updateEdgeLabel(id, label) {
  if (FSM.edges[id]) {
    FSM.edges[id].label = label;
    markDirty();
    _renderFn();
  }
}

function deleteSelectedNode() {
  if (uiState.selectedNodeId) {
    FSM.removeNode(uiState.selectedNodeId);
    uiState.selectedNodeId = null;
    markDirty();
    _renderFn();
  }
}

function deleteSelectedEdge() {
  if (uiState.selectedEdgeId) {
    FSM.removeEdge(uiState.selectedEdgeId);
    uiState.selectedEdgeId = null;
    markDirty();
    _renderFn();
  }
}

function addDoDFromInput(nodeId) {
  const input  = document.getElementById('dodAddInput');
  const select = document.getElementById('dodTypeSelect');
  if (!input || !input.value.trim()) return;
  FSM.addDoDItem(nodeId, input.value.trim(), select.value);
  markDirty();
  _renderFn();
  setTimeout(() => {
    const newInput = document.getElementById('dodAddInput');
    if (newInput) newInput.focus();
  }, 50);
}

function toggleDoD(nodeId, dodId) {
  const node = FSM.nodes[nodeId];
  if (!node) return;
  const item = node.dod.find(d => d.id === dodId);
  if (item) {
    item.checked = !item.checked;
    if (FSM.allDoDChecked(nodeId) && !FSM.hasUncheckedValidation(nodeId)) {
      node.status = 'done';
    }
    markDirty();
    _renderFn();
  }
}

function removeDoDItem(nodeId, dodId) {
  FSM.removeDoDItem(nodeId, dodId);
  markDirty();
  _renderFn();
}

// -------------------------------------------------------
// Context Menu
// -------------------------------------------------------

function nodeContextItems(id) {
  return [
    { label: 'ステータス: 未着手', action: () => setStatus(id, 'idle') },
    { label: 'ステータス: 実装中', action: () => setStatus(id, 'wip')  },
    { label: 'ステータス: 完了',   action: () => setStatus(id, 'done') },
    { type: 'separator' },
    { label: '削除', danger: true, action: () => {
        FSM.removeNode(id);
        uiState.selectedNodeId = null;
        _renderFn();
    }}
  ];
}

function edgeContextItems(id) {
  return [
    { label: '削除', danger: true, action: () => {
        FSM.removeEdge(id);
        uiState.selectedEdgeId = null;
        _renderFn();
    }}
  ];
}

function showContextMenu(x, y, items) {
  const menu = document.getElementById('contextMenu');
  menu.innerHTML = items.map(item => {
    if (item.type === 'separator')
      return '<div style="height:1px;background:var(--border-dim);margin:4px 0"></div>';
    return `<div class="context-menu-item ${item.danger ? 'danger' : ''}">${item.label}</div>`;
  }).join('');
  menu.style.left = x + 'px';
  menu.style.top  = y + 'px';
  menu.classList.add('active');

  const menuItems = menu.querySelectorAll('.context-menu-item');
  let idx = 0;
  items.forEach(item => {
    if (item.type === 'separator') return;
    menuItems[idx].addEventListener('click', () => {
      item.action();
      menu.classList.remove('active');
    });
    idx++;
  });
}

// ============================================================
// MAIN — エントリーポイント
// モジュール間の配線と初期化のみ担当。
// ============================================================

// -------------------------------------------------------
// panel.js の innerHTML inline-handler から呼ばれる関数群を
// window.__fsm に束ねる。
// -------------------------------------------------------
window.__fsm = {
  selectEdge,
  updateNodeName,
  updateNodeSize,
  setStatus,
  updateEdgeLabel,
  deleteSelectedNode,
  deleteSelectedEdge,
  addDoDFromInput,
  toggleDoD,
  removeDoDItem,
  closeModal,
  copyExport,
  doImport: () => doImport(render, fitView),
};

// -------------------------------------------------------
// toolbar の onclick から呼ばれる関数を window に公開
// -------------------------------------------------------
window.addNode        = addNode;
window.toggleEdgeMode = toggleEdgeMode;
window.fitView        = fitView;
window.showImportModal = showImportModal;
window.showExportModal = showExportModal;

// -------------------------------------------------------
// 初期化
// -------------------------------------------------------
function init() {
  // イベント初期化 (render / applyView を注入)
  initEvents(render, applyView);

  // 未保存警告
  initBeforeUnload();

  // サンプルデータ (PDCA)
  const s1 = FSM.addNode('Plan',  300,  50);
  const s2 = FSM.addNode('Do',    300, 300);
  const s3 = FSM.addNode('Check', 600, 300);
  const s4 = FSM.addNode('Act',   600,  50);

  FSM.addEdge(s1, s2, 'plan');
  FSM.addEdge(s2, s3, 'do');
  FSM.addEdge(s2, s2, 'do');
  FSM.addEdge(s3, s4, 'check');
  FSM.addEdge(s4, s1, 'act');

  FSM.addDoDItem(s1, 'verification1',   'verification');
  FSM.addDoDItem(s1, 'validation1',     'validation');
  FSM.addDoDItem(s2, 'verification2',   'verification');
  FSM.addDoDItem(s2, 'validation2',     'validation');
  FSM.addDoDItem(s3, 'verification3-1', 'verification');
  FSM.addDoDItem(s3, 'verification3-2', 'verification');
  FSM.addDoDItem(s4, 'validation4-1',   'verification');
  FSM.addDoDItem(s4, 'validation4-2',   'validation');

  render();
  setTimeout(fitView, 100);
  // init完了時点はclean状態
}

init();
</script>
</body>
