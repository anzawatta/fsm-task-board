<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSM Task Board</title>
<link rel="stylesheet" href="./styles/main.css">
</head>
<body>

<div class="app">
  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="toolbar-title">FSM<span>:</span>Task Board</div>
    <button class="btn" onclick="addNode()" title="Add Node">+ Node</button>
    <button class="btn" id="edgeModeBtn" onclick="toggleEdgeMode()" title="Add Edge">+ Edge</button>
    <div class="toolbar-sep"></div>
    <button class="btn" onclick="fitView()">Fit View</button>
    <div class="toolbar-right">
      <span class="file-name-badge" id="fileNameBadge">untitled</span>
      <div class="dirty-badge" id="dirtyBadge">*</div>
      <button class="btn" onclick="openFile()">Open</button>
      <button class="btn" onclick="saveFile()">Save</button>
      <button class="btn btn-accent" onclick="saveFileAs()">Save As</button>
    </div>
  </div>

  <!-- CANVAS -->
  <div class="canvas-area" id="canvas">
    <svg id="svgCanvas" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrowhead" viewBox="0 0 10 7" refX="10" refY="3.5"
          markerWidth="8" markerHeight="6" orient="auto-start-reverse">
          <polygon points="0 0, 10 3.5, 0 7" fill="var(--accent-edge)" />
        </marker>
      </defs>
      <g id="edgesGroup"></g>
      <g id="nodesGroup"></g>
    </svg>
    <div class="edge-mode-banner" id="edgeModeBanner">
      Edge Mode: click source → click target &nbsp;|&nbsp; ESC to cancel
    </div>
  </div>

  <!-- SIDE PANEL -->
  <div class="side-panel" id="sidePanel">
    <div class="panel-empty" id="panelEmpty">
      クリックでノード選択<br>
      <span style="font-family:var(--font-mono);font-size:10px;color:var(--text-dim)">
        右クリックでコンテキストメニュー
      </span>
    </div>
    <div id="panelContent" style="display:none"></div>
  </div>
</div>

<!-- CONTEXT MENU -->
<div class="context-menu" id="contextMenu"></div>


<script type="module" src="./main.js"></script>
</body>
</html>
